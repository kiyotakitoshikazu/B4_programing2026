<!DOCTYPE html>
<head>
    <meta charset="utf-8">
    <title>登録</title>
    <script src="../config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../supabaseClient.js"></script>
</head>
<body>
    <h1>表示</h1>
    <div id="display">
        <table id="user-table" border="1">
            <thead>
            <tr>
                <th>大学名</th>
                <th>学部名</th>
                <th>学科名</th>
                <th>学年</th>
                <th>名前</th>
                <th>年齢</th>
                <th>空いている曜日</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <a href="../index.html">ホーム</a>
</body>
</html>
<script>
// 【課題】supabaseからデータをselectして、#displayに表形式で出力する処理を実装してください。

async function loadUsers() {
    const { data, error } = await mySupabase
        .from('users')
        .select('*');
    if (error) {
        console.error('Error loading users:', error);
        return;
    }
    const tbody = document.querySelector('#user-table tbody');
    tbody.innerHTML = '';
    data.forEach(user => {
        const row = document.createElement('tr');
        // 配列（曜日）をカンマ区切り文字列に変換
        const days = user.available_days ? user.available_days.join(', ') : '';
        row.innerHTML = `
            <td>${user.uni_name || ''}</td>
            <td>${user.faculty_name || ''}</td>
            <td>${user.department_name || ''}</td>
            <td>${user.grade || ''}</td>
            <td>${user.name || ''}</td>
            <td>${user.age || ''}</td>
            <td>${days}</td>
        `;
        tbody.appendChild(row);
    });
}
loadUsers();


</script>
